<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* BODY */
body{
    height:100vh;
    overflow:hidden;
    background:#b9ff00;
}

/* TOP */
.top{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.color{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    cursor:pointer;
}

.black{ background:black; }

/* CENTER */
.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.square{
    width:500px;
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* TEXT */
#text{
    font-size:40px;
    letter-spacing:2px;
    white-space:pre-wrap;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-content:center;
}

/* BLOCK MODE */
.block{
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid black;
    padding:6px;
    min-width:30px;
    min-height:30px;
    font-size:18px;
}

/* INPUT */
.input-box{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

textarea{
    width:600px;
    height:90px;
    padding:16px;
    border-radius:30px;
    border:2px solid black;
    font-size:16px;
    text-align:center;
    resize:none;
}

textarea:focus{
    background:black;
    color:#b9ff00;
}

/* PICKERS */
.pickers{
    position:absolute;
    top:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:12px;
}

/* CONTROLS */
.controls{
    position:absolute;
    right:20px;
    top:120px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

button{
    padding:6px;
    border:2px solid black;
    background:white;
    cursor:pointer;
}

/* BLUR */
.blur-btn{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid black;
    background:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- QUICK COLORS -->
<div class="top">
    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color black" onclick="changeColor('black')"></div>

    <div class="blur-btn" onclick="toggleBlur()">A</div>
</div>

<!-- PICKERS -->
<div class="pickers">
    <div>
        text<br>
        <input type="color" oninput="setTextColor(this.value)">
    </div>

    <div>
        background<br>
        <input type="color" oninput="setBgColor(this.value)">
    </div>
</div>

<!-- CONTROLS -->
<div class="controls">
    <button onclick="toggleUpper()">MAJ / MIN</button>
    <button onclick="setAlign('left')">GAUCHE</button>
    <button onclick="setAlign('center')">CENTRE</button>
    <button onclick="setAlign('right')">DROITE</button>
    <button onclick="toggleBlocks()">BLOCS</button>
</div>

<!-- TEXT -->
<div class="center">
    <div class="square">
        <div id="text"></div>
    </div>
</div>

<!-- INPUT -->
<div class="input-box">
    <textarea id="input" oninput="updateText()">you seem pretty sad for a girl so in love</textarea>
</div>

<script>

let blurOn = false;
let isUpper = false;
let align = "center";
let blockMode = false;

/* UPDATE */
function updateText(){
    render();
}

/* RENDER */
function render(){

    let v = document.getElementById("input").value;

    v = isUpper ? v.toUpperCase() : v.toLowerCase();

    const container = document.getElementById("text");

    container.innerHTML = "";

    container.style.filter = blurOn ? "blur(1.2px)" : "none";

    container.style.justifyContent =
        align === "left" ? "flex-start" :
        align === "right" ? "flex-end" :
        "center";

    if(blockMode){

        let words = v.split(/\s+/);

        words.forEach(w => {

            if(!w.trim()) return;

            let div = document.createElement("div");
            div.className = "block";
            div.innerText = w;

            let size = Math.random() * 25 + 25;
            div.style.minWidth = size + "px";
            div.style.minHeight = size + "px";

            container.appendChild(div);
        });

    } else {
        container.style.display = "block";
        container.innerText = v;
    }
}

/* BLUR */
function toggleBlur(){
    blurOn = !blurOn;
    render();
}

/* CASE */
function toggleUpper(){
    isUpper = !isUpper;
    render();
}

/* ALIGN */
function setAlign(a){
    align = a;
    render();
}

/* BLOCKS */
function toggleBlocks(){
    blockMode = !blockMode;
    containerDisplayFix();
    render();
}

/* COLORS */
function changeColor(c){
    document.body.style.background = c;
}

function setTextColor(c){
    document.getElementById("text").style.color = c;
}

function setBgColor(c){
    document.body.style.background = c;
}

/* FIX DISPLAY */
function containerDisplayFix(){
    document.getElementById("text").style.display =
        blockMode ? "flex" : "block";
}

containerDisplayFix();

</script>

</body>
</html>
