<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brat generator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #b9ff00;
    color: black;
}

/* 🎨 COLORS */
.top {
    position: absolute;
    top: 25px;
    left: 25px;
    display: flex;
    gap: 10px;
}

.color {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid black;
    cursor: pointer;
}

/* 🧠 CENTER TEXT */
.generator {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.preview {
    font-size: 85px;
    text-align: left;
    line-height: 1.05;

    /* ↔️ ESPACEMENT HORIZONTAL */
    letter-spacing: 2px;

    /* 🌫 FLU */
    filter: blur(1.2px);
    transition: filter 0.3s ease, transform 0.3s ease;
}

/* ✨ hover plus clean (optionnel point 4 amélioré) */
.preview:hover {
    filter: blur(0px);
    transform: scale(1.01);
}

/* ✏️ INPUT */
.input-box {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
}

input {
    width: 600px;
    padding: 16px;
    border-radius: 30px;
    border: 2px solid black;
    font-size: 18px;
    text-align: center;
    outline: none;
}

input:focus {
    background: black;
    color: #b9ff00;
}

/* texture légère */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.03),
        rgba(0,0,0,0.03) 1px,
        transparent 1px,
        transparent 4px
    );
    pointer-events: none;
}
</style>

</head>

<body>

<!-- 🎨 COLORS -->
<div class="top">
    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color" style="background:#0057ff" onclick="changeColor('#0057ff')"></div>
</div>

<!-- 🧠 TEXT -->
<div class="generator">
    <div class="preview" id="text">
        you seem<br>
        pretty sad for a<br>
        girl so in love
    </div>
</div>

<!-- ✏️ INPUT -->
<div class="input-box">
<input 
id="input"
value="you seem pretty sad for a girl so in love"
oninput="updateText()">
</div>

<script>

function updateText(){
    let value = document.getElementById("input").value;

    document.getElementById("text").innerHTML =
    value.toLowerCase().replaceAll(" ","<br>");
}

function changeColor(color){
    document.body.style.background = color;
}

</script>

</body>
</html>
