<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brat Generator</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    text-transform: lowercase;
}

body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #b9ff00;
    transition: background 0.3s;
}

/* 💀 header deface */
.name {
    position: absolute;
    right: 30px;
    top: 30px;
    background: black;
    color: #b9ff00;
    padding: 10px 18px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 1px;

    /* effet "glitch / deface" */
    filter: blur(0.3px);
    opacity: 0.95;
    transform: rotate(-1deg);
}

/* barre du haut */
.top {
    position: absolute;
    top: 35px;
    left: 25px;
    display: flex;
    gap: 12px;
}

/* boutons couleurs */
.color {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid black;
}

/* zone texte */
.generator {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.preview {
    font-size: 90px;
    max-width: 700px;
    text-align: left;
    line-height: 0.9;
    color: black;

    filter: blur(0.7px);
    transition: filter 0.3s ease, transform 0.3s ease;
}

/* effet hover clean */
.preview:hover {
    filter: blur(0px);
    transform: scale(1.01);
}

/* input */
.input-box {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
}

input {
    width: 620px;
    padding: 18px;
    border-radius: 30px;
    border: 1px solid black;
    font-size: 20px;
    text-align: center;
    outline: none;
}

/* petit effet brut */
input:focus {
    background: black;
    color: #b9ff00;
}
</style>

</head>

<body>

<!-- 💀 DEFACED BRAND -->
<div class="name">
Howard Stirling ☰
</div>

<!-- 🎨 COLORS -->
<div class="top">
    <div class="color" style="background:white" onclick="changeColor('white')"></div>
    <div class="color" style="background:#ffb6d9" onclick="changeColor('#ffb6d9')"></div>
    <div class="color" style="background:#ffe600" onclick="changeColor('#ffe600')"></div>
    <div class="color" style="background:#00c853" onclick="changeColor('#00c853')"></div>
    <div class="color" style="background:#0057ff" onclick="changeColor('#0057ff')"></div>
    <div class="color" style="background:#ff8c00" onclick="changeColor('#ff8c00')"></div>
    <div class="color" style="background:#ff1744" onclick="changeColor('#ff1744')"></div>
    <div class="color" style="background:#8e24aa" onclick="changeColor('#8e24aa')"></div>
</div>

<!-- 🧠 TEXT -->
<div class="generator">
    <div class="preview" id="text">
        you seem<br>
        pretty sad for a<br>
        girl so in love
    </div>
</div>

<!-- ✏️ INPUT -->
<div class="input-box">
<input 
id="input"
value="you seem pretty sad for a girl so in love"
oninput="updateText()">
</div>

<script>

function updateText(){
    let value = document.getElementById("input").value;

    document.getElementById("text").innerHTML =
    value.toLowerCase().replaceAll(" ","<br>");
}

function changeColor(color){
    document.body.style.background = color;
}

</script>

</body>
</html>
